<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3-TTS Studio</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --primary: #6c63ff;
    --primary-hover: #5a52e0;
    --danger: #e74c3c;
    --danger-hover: #c0392b;
    --success: #2ecc71;
    --text: #e4e4e7;
    --text-dim: #9ca3af;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  h1 { font-size: 1.6rem; margin-bottom: 20px; text-align: center; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card h2 {
    font-size: 1.1rem;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .card-status { grid-column: 1 / -1; }

  label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 4px; }
  input[type="text"], input[type="password"], textarea, select {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.9rem;
    margin-bottom: 12px;
    resize: vertical;
  }
  textarea { min-height: 60px; }
  .ref-text-display {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    font-size: 1.15rem;
    line-height: 1.7;
    margin-bottom: 12px;
    min-height: 60px;
    white-space: pre-wrap;
  }

  button {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s;
    color: #fff;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .btn-primary { background: var(--primary); }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-primary:disabled { background: #444; cursor: not-allowed; }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: var(--danger-hover); }
  .btn-success { background: var(--success); }

  .rec-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .rec-timer {
    font-variant-numeric: tabular-nums;
    font-size: 1.1rem;
    color: var(--danger);
    min-width: 50px;
  }
  .rec-dot {
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--danger);
    border-radius: 50%;
    animation: blink 1s infinite;
    margin-right: 4px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  audio { width: 100%; margin: 8px 0; }

  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 120px; }

  #log {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 0.78rem;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.5;
    color: var(--text-dim);
  }
  #log .log-entry { margin-bottom: 2px; }
  #log .log-time { color: #555; }
  #log .log-ok { color: var(--success); }
  #log .log-err { color: var(--danger); }

  .speakers-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .speaker-chip {
    background: var(--primary);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.82rem;
  }
  .mode-toggle { display: flex; gap: 0; margin-bottom: 12px; }
  .mode-toggle button {
    border-radius: 0;
    margin: 0;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .mode-toggle button:first-child { border-radius: 6px 0 0 6px; }
  .mode-toggle button:last-child { border-radius: 0 6px 6px 0; }
  .mode-toggle button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #555;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-left: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>Qwen3-TTS Studio</h1>

<div style="max-width:1200px;margin:0 auto 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
  <label style="margin:0;white-space:nowrap;font-size:0.85rem;">Server URL</label>
  <input type="text" id="serverUrl" style="margin:0;flex:1;max-width:360px;" placeholder="http://localhost:8000">
  <label style="margin:0;white-space:nowrap;font-size:0.85rem;">Token</label>
  <input type="password" id="tokenInput" style="margin:0;flex:0 1 200px;" placeholder="(optional)">
  <button class="btn-primary" onclick="testConnection()" style="margin:0;white-space:nowrap;">Test Connection</button>
  <span id="connStatus" style="font-size:0.82rem;"></span>
</div>

<div class="grid">
  <!-- ============ Card 1: Recording ============ -->
  <div class="card">
    <h2>1. Record Reference Audio</h2>

    <label>Microphone</label>
    <div class="row" style="margin-bottom:12px;">
      <div><select id="micSelect"><option value="">Loading devices...</option></select></div>
      <div style="flex:0"><button class="btn-primary" onclick="refreshMics()" style="margin:0;">Refresh</button></div>
    </div>

    <label>Reference Text (read this aloud)</label>
    <textarea id="refText" placeholder="Type or paste the text you will read aloud...">在一无所知中，梦想是唯一的光芒，指引我们穿越黑暗。</textarea>

    <div class="rec-controls">
      <button id="btnRec" class="btn-danger" onclick="toggleRecording()">Start Recording</button>
      <span id="recStatus"></span>
    </div>

    <div id="recPlayback" style="display:none">
      <label>Playback</label>
      <audio id="recAudio" controls></audio>
    </div>

    <hr style="border-color:var(--border); margin:14px 0">

    <label>Speaker Name</label>
    <div class="row">
      <div><input type="text" id="speakerName" placeholder="my-voice"></div>
      <div style="flex:0">
        <button class="btn-primary" id="btnRegister" onclick="registerSpeaker()" disabled>Register Speaker</button>
      </div>
    </div>
  </div>

  <!-- ============ Card 2: TTS Test ============ -->
  <div class="card">
    <h2>2. TTS Test</h2>

    <div class="mode-toggle">
      <button class="active" onclick="setMode('clone')">Clone Mode</button>
      <button onclick="setMode('speaker')">Speaker Mode</button>
    </div>

    <div id="speakerSelect" style="display:none">
      <label>Speaker</label>
      <select id="selSpeaker"></select>
    </div>

    <label>Text to Synthesize</label>
    <textarea id="ttsText" placeholder="Enter text to synthesize..." rows="3">你好，欢迎使用语音合成系统。</textarea>

    <div class="row">
      <div>
        <label>Language</label>
        <select id="ttsLang">
          <option value="Chinese">Chinese</option>
          <option value="English">English</option>
          <option value="auto">Auto</option>
        </select>
      </div>
      <div style="flex:0">
        <button class="btn-primary" id="btnGenerate" onclick="generateTTS()">Generate</button>
      </div>
    </div>

    <div id="ttsResult" style="display:none; margin-top:12px">
      <label>Result</label>
      <audio id="ttsAudio" controls></audio>
    </div>
  </div>

  <!-- ============ Card 3: Status ============ -->
  <div class="card card-status">
    <h2>Status</h2>
    <label>Registered Speakers</label>
    <div class="speakers-list" id="speakersList">
      <span style="color:var(--text-dim)">None</span>
    </div>
    <label>Log</label>
    <div id="log"></div>
  </div>
</div>

<script>
// =========================================================================
// State
// =========================================================================
let mediaRecorder = null;
let audioChunks = [];
let recordingStartTime = 0;
let timerInterval = null;
let recordedBlob = null;   // webm/opus blob from MediaRecorder
let recordedWavBlob = null; // WAV blob (converted)
let ttsMode = 'clone';      // 'clone' | 'speaker'

// =========================================================================
// Server URL helpers
// =========================================================================
function getBaseUrl() {
  const input = document.getElementById('serverUrl').value.trim();
  if (input) return input.replace(/\/+$/, '');
  // If served by the server itself, use same origin; otherwise default
  if (location.protocol !== 'file:') return '';
  return 'http://localhost:8000';
}

function apiUrl(path) {
  return getBaseUrl() + path;
}

function getToken() {
  return document.getElementById('tokenInput').value.trim();
}

function apiFetch(path, options = {}) {
  const token = getToken();
  if (token) {
    options.headers = options.headers || {};
    // Preserve existing headers (e.g. Content-Type) when set
    if (options.headers instanceof Headers) {
      options.headers.set('Authorization', 'Bearer ' + token);
    } else {
      options.headers['Authorization'] = 'Bearer ' + token;
    }
  }
  return fetch(apiUrl(path), options);
}

async function testConnection() {
  const status = document.getElementById('connStatus');
  status.innerHTML = '<span class="spinner"></span>';
  try {
    const resp = await apiFetch('/health');
    if (resp.status === 401) {
      status.innerHTML = `<span style="color:var(--danger)">401 Unauthorized — check Token</span>`;
      log('Server reachable but token is missing or incorrect.', 'err');
      return;
    }
    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}`);
    }
    const data = await resp.json();
    status.innerHTML = `<span style="color:var(--success)">Connected: ${data.model}</span>`;
    log(`Server connected: ${data.model}`, 'ok');
    refreshSpeakers();
  } catch (err) {
    status.innerHTML = `<span style="color:var(--danger)">Unreachable</span>`;
    log('Cannot reach server: ' + err.message, 'err');
  }
}

// =========================================================================
// Logging
// =========================================================================
function log(msg, type) {
  const el = document.getElementById('log');
  const now = new Date().toLocaleTimeString();
  const cls = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : '';
  el.innerHTML += `<div class="log-entry"><span class="log-time">[${now}]</span> <span class="${cls}">${escapeHtml(msg)}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =========================================================================
// Microphone device enumeration
// =========================================================================
async function refreshMics() {
  const sel = document.getElementById('micSelect');
  try {
    // Need a temporary getUserMedia to trigger permission, then enumerate
    const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    tempStream.getTracks().forEach(t => t.stop());

    const devices = await navigator.mediaDevices.enumerateDevices();
    const mics = devices.filter(d => d.kind === 'audioinput');
    sel.innerHTML = '';
    if (mics.length === 0) {
      sel.innerHTML = '<option value="">No microphones found</option>';
      log('No microphone devices found.', 'err');
      return;
    }
    mics.forEach((mic, i) => {
      const opt = document.createElement('option');
      opt.value = mic.deviceId;
      opt.textContent = mic.label || `Microphone ${i + 1}`;
      sel.appendChild(opt);
    });
    log(`Found ${mics.length} microphone(s).`);
  } catch (err) {
    sel.innerHTML = '<option value="">Permission denied</option>';
    log('Microphone access denied: ' + err.message, 'err');
  }
}

// =========================================================================
// Recording
// =========================================================================
async function toggleRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const deviceId = document.getElementById('micSelect').value;
    const constraints = deviceId
      ? { audio: { deviceId: { exact: deviceId } } }
      : { audio: true };
    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    const track = stream.getAudioTracks()[0];
    log(`Recording with: ${track.label}`);
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
      log(`Recording captured: ${(recordedBlob.size / 1024).toFixed(1)} KB`);

      // Convert to WAV for server compatibility
      log('Converting to WAV...');
      try {
        recordedWavBlob = await webmToWav(recordedBlob);
        log(`WAV ready: ${(recordedWavBlob.size / 1024).toFixed(1)} KB`, 'ok');
      } catch (err) {
        log('WAV conversion failed: ' + err.message, 'err');
        recordedWavBlob = null;
      }

      // Show playback (use original webm for browser playback)
      const url = URL.createObjectURL(recordedBlob);
      document.getElementById('recAudio').src = url;
      document.getElementById('recPlayback').style.display = '';
      document.getElementById('btnRegister').disabled = !recordedWavBlob;
    };

    mediaRecorder.start(250); // collect in 250ms chunks
    recordingStartTime = Date.now();
    updateRecButton(true);
    timerInterval = setInterval(updateTimer, 100);
    log('Recording started...');
  } catch (err) {
    log('Microphone access denied: ' + err.message, 'err');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    clearInterval(timerInterval);
    updateRecButton(false);
    log('Recording stopped.');
  }
}

function updateRecButton(recording) {
  const btn = document.getElementById('btnRec');
  const status = document.getElementById('recStatus');
  if (recording) {
    btn.textContent = 'Stop';
    status.innerHTML = '<span class="rec-dot"></span><span class="rec-timer" id="recTimer">0.0s</span>';
  } else {
    btn.textContent = 'Start Recording';
    status.innerHTML = '';
  }
}

function updateTimer() {
  const el = document.getElementById('recTimer');
  if (el) {
    const secs = ((Date.now() - recordingStartTime) / 1000).toFixed(1);
    el.textContent = secs + 's';
  }
}

// =========================================================================
// WebM → WAV conversion (browser-side)
// =========================================================================
async function webmToWav(blob) {
  const arrayBuf = await blob.arrayBuffer();
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const audioBuffer = await ctx.decodeAudioData(arrayBuf);

  // Downmix to mono
  const srcRate = audioBuffer.sampleRate;
  const srcLen = audioBuffer.length;
  let mono = new Float32Array(srcLen);

  if (audioBuffer.numberOfChannels === 1) {
    mono.set(audioBuffer.getChannelData(0));
  } else {
    const left = audioBuffer.getChannelData(0);
    const right = audioBuffer.getChannelData(1);
    for (let i = 0; i < srcLen; i++) {
      mono[i] = (left[i] + right[i]) / 2;
    }
  }

  // Resample to 24kHz using OfflineAudioContext for server compatibility
  const TARGET_SR = 24000;
  let finalSamples = mono;
  let finalRate = srcRate;

  if (srcRate !== TARGET_SR) {
    const duration = srcLen / srcRate;
    const offlineLen = Math.ceil(duration * TARGET_SR);
    const offline = new OfflineAudioContext(1, offlineLen, TARGET_SR);
    const buf = offline.createBuffer(1, srcLen, srcRate);
    buf.getChannelData(0).set(mono);
    const src = offline.createBufferSource();
    src.buffer = buf;
    src.connect(offline.destination);
    src.start();
    const rendered = await offline.startRendering();
    finalSamples = rendered.getChannelData(0);
    finalRate = TARGET_SR;
    log(`Resampled ${srcRate}Hz → ${TARGET_SR}Hz (${finalSamples.length} samples)`);
  }

  ctx.close();

  // Encode WAV (16-bit PCM)
  const wavBlob = encodeWav(finalSamples, finalRate);
  return wavBlob;
}

function encodeWav(samples, sampleRate) {
  const bitsPerSample = 16;
  const bytesPerSample = bitsPerSample / 8;
  const numSamples = samples.length;
  const dataSize = numSamples * bytesPerSample;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * bytesPerSample, true);
  view.setUint16(32, bytesPerSample, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < numSamples; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    s = s < 0 ? s * 0x8000 : s * 0x7FFF;
    view.setInt16(offset, s, true);
    offset += 2;
  }

  return new Blob([buffer], { type: 'audio/wav' });
}

function writeString(view, offset, str) {
  for (let i = 0; i < str.length; i++) {
    view.setUint8(offset + i, str.charCodeAt(i));
  }
}

// =========================================================================
// Speaker Registration
// =========================================================================
async function registerSpeaker() {
  const name = document.getElementById('speakerName').value.trim();
  if (!name) { log('Please enter a speaker name.', 'err'); return; }
  if (!recordedWavBlob) { log('No recording available.', 'err'); return; }

  const refText = document.getElementById('refText').value.trim();
  if (!refText) { log('Reference text is empty.', 'err'); return; }

  const btn = document.getElementById('btnRegister');
  btn.disabled = true;
  btn.innerHTML = 'Registering...<span class="spinner"></span>';

  const fd = new FormData();
  fd.append('name', name);
  fd.append('ref_audio', recordedWavBlob, 'ref.wav');
  fd.append('ref_text', refText);

  try {
    log(`Registering speaker "${name}" (WAV ${(recordedWavBlob.size / 1024).toFixed(0)} KB)...`);
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000); // 5 min timeout
    const resp = await apiFetch('/v1/speakers', { method: 'POST', body: fd, signal: controller.signal });
    clearTimeout(timeout);
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`${resp.status}: ${errText}`);
    }
    const data = await resp.json();
    log(`Speaker "${name}" registered!`, 'ok');
    refreshSpeakers();
  } catch (err) {
    if (err.name === 'AbortError') {
      log('Registration timed out (>5 min). Check server logs.', 'err');
    } else {
      log('Registration failed: ' + err.message, 'err');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Register Speaker';
  }
}

// =========================================================================
// Speaker List
// =========================================================================
async function refreshSpeakers() {
  try {
    const resp = await apiFetch('/v1/speakers');
    const data = await resp.json();
    const all = [...(data.builtin || []), ...(data.cached || [])];
    const el = document.getElementById('speakersList');
    const sel = document.getElementById('selSpeaker');

    if (all.length === 0) {
      el.innerHTML = '<span style="color:var(--text-dim)">None</span>';
      sel.innerHTML = '<option value="">-- no speakers --</option>';
    } else {
      el.innerHTML = all.map(n => `<span class="speaker-chip">${n}</span>`).join('');
      sel.innerHTML = all.map(n => `<option value="${n}">${n}</option>`).join('');
    }
  } catch (err) {
    log('Failed to load speakers: ' + err.message, 'err');
  }
}

// =========================================================================
// TTS Mode Toggle
// =========================================================================
function setMode(mode) {
  ttsMode = mode;
  document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.mode-toggle button:${mode === 'clone' ? 'first-child' : 'last-child'}`).classList.add('active');
  document.getElementById('speakerSelect').style.display = mode === 'speaker' ? '' : 'none';
  if (mode === 'speaker') refreshSpeakers();
}

// =========================================================================
// TTS Generation
// =========================================================================
async function generateTTS() {
  const text = document.getElementById('ttsText').value.trim();
  if (!text) { log('Please enter text to synthesize.', 'err'); return; }

  const lang = document.getElementById('ttsLang').value;
  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  btn.innerHTML = 'Generating...<span class="spinner"></span>';

  try {
    let resp;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 300000); // 5 min

    if (ttsMode === 'clone') {
      // Clone mode: use recorded audio + ref_text
      if (!recordedWavBlob) {
        log('No recording available. Record audio first.', 'err');
        return;
      }
      const refText = document.getElementById('refText').value.trim();
      if (!refText) { log('Reference text is empty.', 'err'); return; }

      const fd = new FormData();
      fd.append('text', text);
      fd.append('language', lang);
      fd.append('ref_audio', recordedWavBlob, 'ref.wav');
      fd.append('ref_text', refText);
      fd.append('response_format', 'wav');

      log(`[Clone] Generating: "${text.substring(0, 40)}..."`);
      resp = await apiFetch('/v1/audio/speech/clone', { method: 'POST', body: fd, signal: controller.signal });

    } else {
      // Speaker mode: use registered speaker name
      const speaker = document.getElementById('selSpeaker').value;
      if (!speaker) { log('No speaker selected.', 'err'); return; }

      log(`[Speaker: ${speaker}] Generating: "${text.substring(0, 40)}..."`);
      resp = await apiFetch('/v1/audio/speech', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          input: text,
          voice: speaker,
          language: lang,
          response_format: 'wav',
        }),
        signal: controller.signal,
      });
    }

    clearTimeout(timeout);

    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`${resp.status}: ${errText}`);
    }

    const audioBlob = await resp.blob();
    const url = URL.createObjectURL(audioBlob);
    const audioEl = document.getElementById('ttsAudio');
    audioEl.src = url;
    document.getElementById('ttsResult').style.display = '';
    audioEl.play();
    log(`Audio generated: ${(audioBlob.size / 1024).toFixed(1)} KB`, 'ok');

  } catch (err) {
    if (err.name === 'AbortError') {
      log('Generation timed out (>5 min). Check server logs.', 'err');
    } else {
      log('Generation failed: ' + err.message, 'err');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate';
  }
}

// =========================================================================
// Init
// =========================================================================
window.addEventListener('DOMContentLoaded', async () => {
  // Restore token from localStorage
  const savedToken = localStorage.getItem('tts_token');
  if (savedToken) document.getElementById('tokenInput').value = savedToken;

  // Persist token on change
  document.getElementById('tokenInput').addEventListener('input', () => {
    localStorage.setItem('tts_token', document.getElementById('tokenInput').value);
  });

  // Auto-populate server URL for file:// access
  const urlInput = document.getElementById('serverUrl');
  if (location.protocol === 'file:') {
    urlInput.value = 'http://localhost:8000';
    log('Opened as local file. Server URL set to http://localhost:8000');
  } else {
    urlInput.placeholder = location.origin + ' (same origin)';
  }

  // Auto-test connection + enumerate mics
  await testConnection();
  await refreshMics();
  log('UI ready. Select microphone, then record.');
});
</script>

</body>
</html>
